name: Recent Activity
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
        with:
          COMMIT_MSG: "chore: update recent activity [skip ci]"
          MAX_LINES: 5
