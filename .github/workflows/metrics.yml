name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: God-Mode Dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: adrijimcab
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Europe/Madrid
          config_erronly: yes
          
          # 1. Activity & Pulse (Modo Público para estabilidad total)
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_visibility: public
          
          # 2. Languages & Technical DNA (Re-activado con seguridad)
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes, percentage
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 30
          plugin_languages_sections: most-used
          
          # 3. Followup & Engagement
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          
          # 4. Habits & Patterns (Simplificado para evitar crash)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: no
          
          # 5. Achievements & Milestones (Modo Compacto)
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          
          # 6. Global Activity Visualization
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Layout & Style
          config_order: base.header, isocalendar, languages, activity, habits, followup, achievements
          config_padding: 0, 8 + 10%
          
          filename: github-metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: absolute stability fix for metrics [skip ci]"
